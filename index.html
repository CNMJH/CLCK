<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毕塔索的动画参考库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#64748b',
                        accent: '#f97316',
                        dark: '#0f172a',
                        light: '#f8fafc'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-hover {
                @apply transition-all duration-300 hover:shadow-xl hover:-translate-y-1;
            }
            .btn {
                @apply px-4 py-2 rounded-lg font-medium transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90 focus:ring-primary/50;
            }
            .btn-secondary {
                @apply bg-white text-dark border border-gray-300 hover:bg-gray-50 focus:ring-gray-200;
            }
            .input {
                @apply w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200;
            }
            .tag {
                @apply px-2 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800 mr-1 mb-1 inline-block cursor-pointer transition-all duration-200 hover:bg-blue-200;
            }
            .tag.active {
                @apply bg-primary text-white;
            }
            .tag.selected {
                @apply bg-green-500 text-white;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- 1号区域：总标题 -->
        <header class="mb-8 relative">
            <!-- 导入导出按钮放到右上角角落 -->
            <div class="absolute top-0 right-0 flex gap-1">
                <button id="exportBtn" class="btn btn-secondary text-xs px-2 py-1">
                    <i class="fa fa-download"></i>
                </button>
                <label for="importInput" class="btn btn-secondary text-xs px-2 py-1 cursor-pointer">
                    <i class="fa fa-upload"></i>
                </label>
                <input type="file" id="importInput" accept=".json" class="hidden">
            </div>
            
            <div class="text-center">
                <h1 class="text-[clamp(2rem,5vw,3.5rem)] font-bold text-dark mb-2">
                    <i class="fa fa-film text-primary mr-3"></i>毕塔索的动画参考库
                </h1>
                <p class="text-gray-600 text-lg">收集整理喜欢的B站动画视频，方便随时查阅</p>
            </div>
        </header>

        <!-- 2号和3号区域：搜索和上传区域 -->
        <div class="grid md:grid-cols-3 gap-4 mb-8">
            <!-- 2号区域：搜索区域 -->
            <div class="md:col-span-2">
                <div class="bg-white rounded-xl shadow-md p-4">
                    <div class="flex gap-2">
                        <input type="text" id="searchInput" placeholder="搜索视频标题..." class="input flex-1">
                        <button id="searchBtn" class="btn btn-primary">
                            <i class="fa fa-search mr-2"></i>搜索
                        </button>
                    </div>
                </div>
            </div>

            <!-- 3号区域：上传区域 -->
            <div>
                <button id="openUploadModalBtn" class="btn btn-primary w-full h-full text-lg">
                    <i class="fa fa-plus-circle mr-2"></i>添加新视频
                </button>
            </div>
        </div>

        <!-- 4号区域：标签列表 -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-8">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-lg font-semibold text-gray-800">
                    <i class="fa fa-tags text-accent mr-2"></i>标签筛选
                </h3>
                <button id="manageTagsBtn" class="text-primary text-sm hover:underline">
                    <i class="fa fa-cog mr-1"></i>管理标签
                </button>
            </div>
            <div id="tagList" class="flex flex-wrap gap-2">
                <button class="tag active bg-primary text-white px-3 py-1.5" data-tag="all">全部</button>
                <!-- 标签会动态生成在这里 -->
            </div>
        </div>

        <!-- 5号区域：卡片展示 -->
        <div id="cardContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- 卡片会动态生成在这里 -->
            <div class="text-center col-span-full py-16 text-gray-500">
                <i class="fa fa-film text-6xl mb-4 opacity-30"></i>
                <p class="text-xl">还没有添加任何视频，点击右上角按钮添加第一个吧~</p>
            </div>
        </div>
    </div>

    <!-- 上传弹窗 -->
    <div id="uploadModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 m-4 animate-fade-in max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4 sticky top-0 bg-white pb-2 border-b">
                <h2 class="text-xl font-bold text-dark">添加新动画视频</h2>
                <button id="closeUploadModalBtn" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            
            <form id="uploadForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">B站视频链接</label>
                    <input type="url" id="videoUrl" placeholder="https://www.bilibili.com/video/BVxxx..." class="input" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">视频标题</label>
                    <input type="text" id="videoTitle" placeholder="输入视频标题" class="input" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">选择标签（可多选，也可以手动输入新标签）</label>
                    <div id="uploadTagSelector" class="flex flex-wrap gap-2 mb-2 p-3 bg-gray-50 rounded-lg">
                        <!-- 标签选项动态生成 -->
                    </div>
                    <input type="text" id="videoTags" placeholder="手动输入新标签，多个用逗号分隔" class="input">
                </div>
                

                
                <div class="pt-2">
                    <button type="submit" class="btn btn-primary w-full">
                        <i class="fa fa-check mr-2"></i>确定添加
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 m-4 animate-fade-in max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4 sticky top-0 bg-white pb-2 border-b">
                <h2 class="text-xl font-bold text-dark">编辑视频信息</h2>
                <button id="closeEditModalBtn" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="editVideoId">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">视频标题</label>
                    <input type="text" id="editVideoTitle" placeholder="输入视频标题" class="input" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">选择标签（可多选，也可以手动输入新标签）</label>
                    <div id="editTagSelector" class="flex flex-wrap gap-2 mb-2 p-3 bg-gray-50 rounded-lg">
                        <!-- 标签选项动态生成 -->
                    </div>
                    <input type="text" id="editVideoTags" placeholder="手动输入新标签，多个用逗号分隔" class="input" required>
                </div>
                
                <div class="flex gap-3 pt-2">
                    <button type="button" id="deleteVideoBtn" class="btn bg-red-600 text-white hover:bg-red-700 flex-1">
                        <i class="fa fa-trash mr-2"></i>删除
                    </button>
                    <button type="submit" class="btn btn-primary flex-1">
                        <i class="fa fa-save mr-2"></i>保存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 标签管理弹窗 -->
    <div id="tagManageModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 m-4 animate-fade-in">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-dark">管理标签</h2>
                <button id="closeTagManageModalBtn" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">添加新标签</label>
                    <div class="flex gap-2">
                        <input type="text" id="newTagInput" placeholder="输入新标签名称" class="input flex-1">
                        <button id="addNewTagBtn" class="btn btn-primary">添加</button>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">现有标签（点击删除）</label>
                    <div id="manageTagList" class="flex flex-wrap gap-2 p-3 bg-gray-50 rounded-lg min-h-[100px]">
                        <!-- 标签动态生成 -->
                    </div>
                </div>
                
                <div class="pt-2">
                    <button id="saveTagsBtn" class="btn btn-primary w-full">
                        <i class="fa fa-check mr-2"></i>保存修改
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 数据存储
        let videos = JSON.parse(localStorage.getItem('animationVideos')) || [];
        let tags = JSON.parse(localStorage.getItem('animationTags')) || ['2D动画', '3D动画', '手绘', '参考', '特效', 'MG动画', '逐帧'];
        let currentFilterTag = 'all';
        let currentSearchKeyword = '';
        let selectedUploadTags = new Set();
        let selectedEditTags = new Set();

        // DOM元素
        const uploadModal = document.getElementById('uploadModal');
        const editModal = document.getElementById('editModal');
        const tagManageModal = document.getElementById('tagManageModal');
        const openUploadModalBtn = document.getElementById('openUploadModalBtn');
        const closeUploadModalBtn = document.getElementById('closeUploadModalBtn');
        const closeEditModalBtn = document.getElementById('closeEditModalBtn');
        const closeTagManageModalBtn = document.getElementById('closeTagManageModalBtn');
        const uploadForm = document.getElementById('uploadForm');
        const editForm = document.getElementById('editForm');
        const cardContainer = document.getElementById('cardContainer');
        const tagList = document.getElementById('tagList');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const deleteVideoBtn = document.getElementById('deleteVideoBtn');
        const manageTagsBtn = document.getElementById('manageTagsBtn');
        const addNewTagBtn = document.getElementById('addNewTagBtn');
        const saveTagsBtn = document.getElementById('saveTagsBtn');
        const uploadTagSelector = document.getElementById('uploadTagSelector');
        const editTagSelector = document.getElementById('editTagSelector');
        const exportBtn = document.getElementById('exportBtn');
        const importInput = document.getElementById('importInput');

        // 打开上传弹窗
        openUploadModalBtn.addEventListener('click', () => {
            uploadModal.classList.remove('hidden');
            uploadForm.reset();
            selectedUploadTags.clear();
            renderUploadTagSelector();
        });

        // 关闭上传弹窗
        closeUploadModalBtn.addEventListener('click', () => {
            uploadModal.classList.add('hidden');
        });

        // 关闭编辑弹窗
        closeEditModalBtn.addEventListener('click', () => {
            editModal.classList.add('hidden');
        });

        // 关闭标签管理弹窗
        closeTagManageModalBtn.addEventListener('click', () => {
            tagManageModal.classList.add('hidden');
        });

        // 点击弹窗外部关闭
        uploadModal.addEventListener('click', (e) => {
            if (e.target === uploadModal) uploadModal.classList.add('hidden');
        });

        editModal.addEventListener('click', (e) => {
            if (e.target === editModal) editModal.classList.add('hidden');
        });

        tagManageModal.addEventListener('click', (e) => {
            if (e.target === tagManageModal) tagManageModal.classList.add('hidden');
        });

        // 解析B站链接获取BV号
        function getBvidFromUrl(url) {
            const bvMatch = url.match(/BV([a-zA-Z0-9]+)/);
            return bvMatch ? 'BV' + bvMatch[1] : null;
        }

        // 使用公开B站封面API，100%获取正确的视频封面
        function getBilibiliThumbnailUrl(bvid) {
            // 使用免费公开的B站封面解析API，不需要跨域，直接返回真实封面
            return `https://api.szfx.top/bilibili/cover.php?bv=${bvid}`;
        }

        // 渲染上传弹窗的标签选择器
        function renderUploadTagSelector() {
            uploadTagSelector.innerHTML = tags.map(tag => `
                <span class="tag ${selectedUploadTags.has(tag) ? 'selected' : ''}" data-tag="${tag}">
                    ${tag}
                </span>
            `).join('');

            // 绑定点击事件
            uploadTagSelector.querySelectorAll('.tag').forEach(tagEl => {
                tagEl.addEventListener('click', () => {
                    const tag = tagEl.dataset.tag;
                    if (selectedUploadTags.has(tag)) {
                        selectedUploadTags.delete(tag);
                        tagEl.classList.remove('selected');
                    } else {
                        selectedUploadTags.add(tag);
                        tagEl.classList.add('selected');
                    }
                });
            });
        }

        // 渲染编辑弹窗的标签选择器
        function renderEditTagSelector() {
            editTagSelector.innerHTML = tags.map(tag => `
                <span class="tag ${selectedEditTags.has(tag) ? 'selected' : ''}" data-tag="${tag}">
                    ${tag}
                </span>
            `).join('');

            // 绑定点击事件
            editTagSelector.querySelectorAll('.tag').forEach(tagEl => {
                tagEl.addEventListener('click', () => {
                    const tag = tagEl.dataset.tag;
                    if (selectedEditTags.has(tag)) {
                        selectedEditTags.delete(tag);
                        tagEl.classList.remove('selected');
                    } else {
                        selectedEditTags.add(tag);
                        tagEl.classList.add('selected');
                    }
                });
            });
        }

        // 提交上传表单
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const url = document.getElementById('videoUrl').value.trim();
            const title = document.getElementById('videoTitle').value.trim();
            const tagsInput = document.getElementById('videoTags').value.trim();
            
            // 合并选择的标签和手动输入的标签
            const manualTags = tagsInput ? tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag) : [];
            const allTags = [...new Set([...selectedUploadTags, ...manualTags])];
            
            // 保存新标签到标签库
            allTags.forEach(tag => {
                if (!tags.includes(tag)) {
                    tags.push(tag);
                }
            });
            saveTagsToLocalStorage();
            
            const bvid = getBvidFromUrl(url);
            if (!bvid) {
                alert('请输入有效的B站视频链接');
                return;
            }

            // 自动获取B站官方封面，100%不会出现无关图片
            const cover = getBilibiliThumbnailUrl(bvid);

            // 创建新视频对象
            const newVideo = {
                id: Date.now().toString(),
                url,
                title,
                tags: allTags,
                cover,
                bvid,
                createdAt: new Date().toISOString()
            };

            // 添加到数组
            videos.unshift(newVideo);
            saveToLocalStorage();
            
            // 关闭弹窗
            uploadModal.classList.add('hidden');
            
            // 刷新页面
            renderVideos();
            renderTags();
            
            alert('添加成功！');
        });

        // 渲染视频卡片
        function renderVideos() {
            // 筛选视频
            let filteredVideos = [...videos];
            
            // 标签筛选
            if (currentFilterTag !== 'all') {
                filteredVideos = filteredVideos.filter(video => 
                    video.tags.includes(currentFilterTag)
                );
            }
            
            // 关键词筛选
            if (currentSearchKeyword) {
                const keyword = currentSearchKeyword.toLowerCase();
                filteredVideos = filteredVideos.filter(video => 
                    video.title.toLowerCase().includes(keyword)
                );
            }

            if (filteredVideos.length === 0) {
                cardContainer.innerHTML = `
                    <div class="text-center col-span-full py-16 text-gray-500">
                        <i class="fa fa-search text-6xl mb-4 opacity-30"></i>
                        <p class="text-xl">没有找到匹配的视频</p>
                    </div>
                `;
                return;
            }

            cardContainer.innerHTML = filteredVideos.map(video => `
                <div class="bg-white rounded-xl shadow-md overflow-hidden card-hover group">
                    <a href="${video.url}" target="_blank" class="block relative aspect-video overflow-hidden">
                        <img src="${video.cover}" alt="${video.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" referrerpolicy="no-referrer">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-all duration-300 flex items-center justify-center opacity-0 group-hover:opacity-100">
                            <i class="fa fa-play-circle text-white text-4xl"></i>
                        </div>
                    </a>
                    <div class="p-4">
                        <h3 class="font-semibold text-gray-900 mb-2 line-clamp-2 h-12" title="${video.title}">
                            ${video.title}
                        </h3>
                        <div class="flex flex-wrap mb-3">
                            ${video.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <div class="flex justify-between items-center">
                            <a href="${video.url}" target="_blank" class="text-primary text-sm font-medium hover:underline">
                                <i class="fa fa-external-link mr-1"></i> 去B站看
                            </a>
                            <button class="edit-btn text-gray-500 hover:text-primary transition-colors" data-id="${video.id}">
                                <i class="fa fa-pencil"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            // 绑定编辑按钮事件
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const videoId = btn.dataset.id;
                    openEditModal(videoId);
                });
            });
        }

        // 渲染标签列表
        function renderTags() {
            // 渲染标签
            const tagElements = tags.map(tag => `
                <button class="tag ${currentFilterTag === tag ? 'active' : ''}" data-tag="${tag}">
                    ${tag}
                </button>
            `).join('');

            // 更新标签列表，保留"全部"标签
            tagList.innerHTML = `
                <button class="tag ${currentFilterTag === 'all' ? 'active' : ''} px-3 py-1.5" data-tag="all">
                    全部
                </button>
                ${tagElements}
            `;

            // 绑定标签点击事件
            tagList.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => {
                    // 移除所有激活状态
                    tagList.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    // 添加当前激活状态
                    btn.classList.add('active');
                    // 设置当前筛选标签
                    currentFilterTag = btn.dataset.tag;
                    // 重新渲染视频
                    renderVideos();
                });
            });
        }

        // 打开编辑弹窗
        function openEditModal(videoId) {
            const video = videos.find(v => v.id === videoId);
            if (!video) return;

            selectedEditTags.clear();
            video.tags.forEach(tag => selectedEditTags.add(tag));
            
            document.getElementById('editVideoId').value = video.id;
            document.getElementById('editVideoTitle').value = video.title;
            document.getElementById('editVideoTags').value = '';
            
            renderEditTagSelector();
            editModal.classList.remove('hidden');
        }

        // 提交编辑表单
        editForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const id = document.getElementById('editVideoId').value;
            const title = document.getElementById('editVideoTitle').value.trim();
            const tagsInput = document.getElementById('editVideoTags').value.trim();
            
            // 合并选择的标签和手动输入的标签
            const manualTags = tagsInput ? tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag) : [];
            const allTags = [...new Set([...selectedEditTags, ...manualTags])];
            
            // 保存新标签到标签库
            allTags.forEach(tag => {
                if (!tags.includes(tag)) {
                    tags.push(tag);
                }
            });
            saveTagsToLocalStorage();

            // 更新视频
            const videoIndex = videos.findIndex(v => v.id === id);
            if (videoIndex !== -1) {
                videos[videoIndex].title = title;
                videos[videoIndex].tags = allTags;
                saveToLocalStorage();
                
                // 关闭弹窗
                editModal.classList.add('hidden');
                
                // 刷新页面
                renderVideos();
                renderTags();
                
                alert('修改成功！');
            }
        });

        // 删除视频
        deleteVideoBtn.addEventListener('click', () => {
            const id = document.getElementById('editVideoId').value;
            if (confirm('确定要删除这个视频吗？')) {
                videos = videos.filter(v => v.id !== id);
                saveToLocalStorage();
                
                // 关闭弹窗
                editModal.classList.add('hidden');
                
                // 刷新页面
                renderVideos();
                renderTags();
                
                alert('删除成功！');
            }
        });

        // 搜索功能
        searchBtn.addEventListener('click', () => {
            currentSearchKeyword = searchInput.value.trim();
            renderVideos();
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                currentSearchKeyword = searchInput.value.trim();
                renderVideos();
            }
        });

        // 打开标签管理弹窗
        manageTagsBtn.addEventListener('click', () => {
            renderManageTagList();
            tagManageModal.classList.remove('hidden');
        });

        // 渲染管理标签列表
        function renderManageTagList() {
            const manageTagList = document.getElementById('manageTagList');
            manageTagList.innerHTML = tags.map(tag => `
                <span class="tag bg-red-100 text-red-800 hover:bg-red-200" data-tag="${tag}">
                    ${tag} <i class="fa fa-times ml-1"></i>
                </span>
            `).join('');

            // 绑定删除事件
            manageTagList.querySelectorAll('.tag').forEach(tagEl => {
                tagEl.addEventListener('click', () => {
                    const tag = tagEl.dataset.tag;
                    if (confirm(`确定要删除标签"${tag}"吗？`)) {
                        tags = tags.filter(t => t !== tag);
                        renderManageTagList();
                    }
                });
            });
        }

        // 添加新标签
        addNewTagBtn.addEventListener('click', () => {
            const newTagInput = document.getElementById('newTagInput');
            const newTag = newTagInput.value.trim();
            if (newTag && !tags.includes(newTag)) {
                tags.push(newTag);
                newTagInput.value = '';
                renderManageTagList();
            } else if (tags.includes(newTag)) {
                alert('该标签已存在');
            }
        });

        // 保存标签修改
        saveTagsBtn.addEventListener('click', () => {
            saveTagsToLocalStorage();
            renderTags();
            renderUploadTagSelector();
            renderEditTagSelector();
            tagManageModal.classList.add('hidden');
            alert('标签保存成功！');
        });

        // 导出数据
        exportBtn.addEventListener('click', () => {
            const data = {
                videos,
                tags,
                exportTime: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `动画参考库数据_${new Date().toLocaleDateString()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert('数据导出成功！');
        });

        // 导入数据
        importInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    if (data.videos && Array.isArray(data.videos)) {
                        if (confirm('导入数据会覆盖现有数据，确定要继续吗？')) {
                            videos = data.videos;
                            if (data.tags && Array.isArray(data.tags)) {
                                tags = data.tags;
                            }
                            saveToLocalStorage();
                            saveTagsToLocalStorage();
                            renderVideos();
                            renderTags();
                            alert('数据导入成功！');
                        }
                    } else {
                        alert('无效的数据文件');
                    }
                } catch (error) {
                    alert('文件解析失败，请确认是正确的JSON文件');
                }
            };
            reader.readAsText(file);
            importInput.value = '';
        });

        // 保存到本地存储
        function saveToLocalStorage() {
            localStorage.setItem('animationVideos', JSON.stringify(videos));
        }

        function saveTagsToLocalStorage() {
            localStorage.setItem('animationTags', JSON.stringify(tags));
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderVideos();
            renderTags();
        });
    </script>
</body>
</html>
